<!DOCTYPE html>
<html lang="en">
<head>
    <title>Resources - OPTIMAQ</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-cogs"></i>
                <span>OPTIMAQ</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="resources.html" class="active"><i class="fas fa-server"></i> Resources</a></li>
                <li><a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
                <li><a href="import-data.html"><i class="fas fa-upload"></i> Import</a></li>
                <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
            </ul>
            <div class="nav-actions">
                <a id="authButton" class="nav-auth" href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            </div>
            <button class="darkBtn" onclick="toggleDark()"><i class="fas fa-moon"></i> Dark Mode</button>
        </div>
    </nav>

    <div class="page-header">
        <h1><i class="fas fa-server"></i> Resource Management</h1>
        <p>Manage and monitor your system resources</p>
    </div>

    <div class="container">
        <!-- Add Resource Form -->
        <div class="resource-form">
            <h2><i class="fas fa-plus-circle"></i> Add New Resource</h2>
            <div class="form-grid">
                <input id="rid" placeholder="Resource Name" type="text">
                <input id="capacityInput" placeholder="Capacity" type="number">
                <input id="loadInput" placeholder="Load" type="number">
                <input id="tasksInput" placeholder="Tasks (comma-separated)" type="text">
                <button onclick="addResource()" class="btn-primary">
                    <i class="fas fa-plus"></i> Add Resource
                </button>
            </div>
        </div>

        <!-- Resource Stats -->
        <div class="stats-section">
            <div class="stat-card">
                <i class="fas fa-server"></i>
                <div>
                    <h3 id="totalResources">0</h3>
                    <p>Total Resources</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div>
                    <h3 id="activeResources">0</h3>
                    <p>Active Resources</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-exclamation-triangle"></i>
                <div>
                    <h3 id="overloadedResources">0</h3>
                    <p>Overloaded</p>
                </div>
            </div>
        </div>

        <!-- Resource List -->
        <div class="resource-list">
            <div class="resourceHeaderBar">
                <h2><i class="fas fa-list"></i> Resource List</h2>
                <input id="searchResource" placeholder="Search resources..." onkeyup="filterResources()">
            </div>
            <div id="resources" class="resource-container"></div>
        </div>

        <!-- Resource Details Modal (placeholder) -->
        <div id="resourceModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Resource Details</h2>
                <div id="resourceDetails"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
    <script>
        // Resources page specific functions
        function updateResourceStats() {
            try {
                const totalResources = resources.length;
                const activeResources = resources.filter(r => parseFloat(r.utilization) > 0).length;
                const overloadedResources = resources.filter(r => parseFloat(r.utilization) > 85).length;

                document.getElementById('totalResources').innerText = totalResources;
                document.getElementById('activeResources').innerText = activeResources;
                document.getElementById('overloadedResources').innerText = overloadedResources;
                console.log(`📊 Stats updated: ${totalResources} total, ${activeResources} active, ${overloadedResources} overloaded`);
            } catch (err) {
                console.error('❌ Error updating stats:', err);
            }
        }

        function renderResourcesList() {
            try {
                const container = document.getElementById('resources');
                if (!container) {
                    console.error('❌ Container element not found');
                    return;
                }

                container.innerHTML = '';

                if (!resources || resources.length === 0) {
                    container.innerHTML = '<p style="text-align: center; padding: 40px; color: #64748b;">No resources added yet. Add some resources to get started!</p>';
                    console.warn('⚠️  No resources to render');
                    return;
                }

                console.log(`📋 Rendering ${resources.length} resources`);

                resources.forEach((r, idx) => {
                    try {
                        // Normalize data
                        const utilization = parseFloat(r.utilization) || 0;
                        const capacity = Number(r.capacity) || 0;
                        const load = Number(r.load) || 0;
                        const tasks = Array.isArray(r.tasks) ? r.tasks : [];

                        let color = "low";
                        if (utilization > 80) color = "high";
                        else if (utilization > 50) color = "medium";

                        let status = "Optimal";
                        if (utilization > 85) status = "Critical";
                        else if (utilization > 60) status = "Moderate";

                        let card = document.createElement("div");
                        card.className = "resource";
                        card.innerHTML = `
                            <div class='resourceHeader'>
                                <h3>${r.id}</h3>
                                <div class='menuBtn' onclick='toggleMenu(this)'>⋮</div>
                            </div>
                            <div class='menuDropdown'>
                                <div onclick='optimizeResource("${r.id}")'>Optimize</div>
                                <div onclick='deleteResource("${r.id}")'>Delete</div>
                            </div>
                            <p>Status: <span class='status ${status}'>${status}</span></p>
                            <p><b>Capacity:</b> ${capacity}</p>
                            <p><b>Load:</b> ${load}</p>
                            <p><b>Utilization:</b> ${utilization}%</p>
                            <div class='progress'>
                                <div class='bar ${color}' style='width:${utilization}%'></div>
                            </div>
                            <p><b>Tasks:</b> ${tasks.length} tasks</p>
                        `;
                        container.appendChild(card);
                    } catch (err) {
                        console.error(`❌ Error rendering resource ${idx}:`, err);
                    }
                });
                console.log('✓ Resources rendered successfully');
            } catch (err) {
                console.error('❌ Error rendering resources list:', err);
            }
        }

        function fetchDefaultResources() {
            console.log('📥 Fetching default resources...');
            fetch('output/result.json')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    return response.json();
                })
                .then(data => {
                    if (Array.isArray(data.resources) && data.resources.length > 0) {
                        console.log(`✓ Loaded ${data.resources.length} default resources`);
                        resources = data.resources.map(r => ({
                            id: r.id,
                            capacity: Number(r.capacity) || 0,
                            load: Number(r.load) || 0,
                            tasks: Array.isArray(r.tasks) ? r.tasks : [],
                            utilization: Number(r.utilization) || 0
                        }));
                        saveResourcesToStorage();
                        updateResourceStats();
                        renderResourcesList();
                    } else {
                        console.warn('⚠️  No resources in default data');
                    }
                })
                .catch(err => {
                    console.warn('⚠️  Could not load default resource data:', err.message);
                });
        }

        // Sync page functions with global ones
        function syncPageWithGlobal() {
            console.log('🔄 Synchronizing page with global state');
            console.log('   Resources in memory:', resources.length);
            console.log('   Resources in storage:', localStorage.getItem('optimaq_resources') ? JSON.parse(localStorage.getItem('optimaq_resources')).length : 0);
            console.log('   Dataset info:', getDatasetInfo());
            updateResourceStats();
            renderResourcesList();
        }

        // Debug function
        function debugResourcesState() {
            console.group('🔍 DEBUG: Resources State');
            console.log('Global resources array:', resources);
            console.log('Total resources:', resources.length);
            const stored = localStorage.getItem('optimaq_resources');
            console.log('Storage content:', stored ? JSON.parse(stored) : 'Empty');
            const datasetInfo = getDatasetInfo();
            console.log('Dataset info:', datasetInfo);
            console.groupEnd();
            return {
                memoryCount: resources.length,
                storageCount: stored ? JSON.parse(stored).length : 0,
                datasetInfo: datasetInfo
            };
        }

        // Make debug available globally
        window.debugResources = debugResourcesState;

        // Load resources on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Resources page DOMContentLoaded');
            
            try {
                requireLogin();
                console.log('✓ Login check passed');
            } catch (err) {
                console.warn('⚠️  Login check error:', err);
            }

            console.log('📥 Loading resources from storage...');
            loadResourcesFromStorage();
            console.log(`📊 Loaded ${resources.length} resources from storage`);

            if (resources.length === 0) {
                console.log('⚠️  No resources in storage, fetching defaults...');
                fetchDefaultResources();
            } else {
                console.log(`✓ Using ${resources.length} resources from storage`);
                syncPageWithGlobal();
            }

            // Re-sync after a short delay to ensure all resources are loaded
            setTimeout(() => {
                console.log('↻ Performing late-sync check');
                if (resources.length > 0) {
                    syncPageWithGlobal();
                    console.log('✓ Late-sync complete');
                }
            }, 500);

            console.log('✓ Resources page fully initialized');
        });

        // Listen for storage changes from other tabs
        window.addEventListener('storage', function(e) {
            if (e.key === 'optimaq_resources') {
                console.log('🔄 Storage changed in another tab, reloading...');
                loadResourcesFromStorage();
                syncPageWithGlobal();
            }
        });
    </script>
</body>
</html>
